{% extends 'base-portal.html' %}
{% load static %}

{% block title %}Error 404{% endblock %}

    {% block content %}
        <div class="container-fluid bg-light py-5">
            <div class="container py-5 text-center">
                <div class="row justify-content-center">
                    <div class="col-lg-6 wow fadeInUp" data-wow-delay="0.3s">
                        <i class="far fa-frown-open display-1 text-primary mb-4" style="width: 80px; height: 80px;"></i>
                        <h1 class="display-1">404</h1>
                        <h1 class="mb-4">Page Not Found</h1>
                        <p class="mb-4">We’re sorry, the page you have looked for does not exist in our website! Please go back to home page.</p>
                        <a class="btn btn-primary rounded-pill py-2 px-4" href="{% url 'home' %}">Go Back To Home</a>
                    </div>
                </div>
            </div>
        </div>
    {% endblock %}
