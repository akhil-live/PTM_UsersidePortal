{% extends 'base-portal.html' %}
{% load static %}

{% block title %}Feedback{% endblock %}

    {% block content %} 
        <div class="container-fluid position-relative p-0">
            <div class="container-fluid bg-breadcrumb">
                <div class="container text-center py-5" style="max-width: 900px;">
                    <h4 class="text-white display-4 mb-4 wow fadeInDown" data-wow-delay="0.1s">Feedback</h4>
                    <ol class="breadcrumb d-flex justify-content-center mb-0 wow fadeInDown" data-wow-delay="0.3s">
                        <li class="breadcrumb-item"><a href="{% url 'home' %}">Home</a></li>
                        <li class="breadcrumb-item active text-grey">Feedback</li>
                    </ol>    
                </div>
            </div>
        </div>
        <div class="container-fluid about py-4">
            <div class="container py-5">
                <div class="row g-5 align-items-center">
                    <div class="col-xl-5 col-lg-5 col-md-12 wow fadeInRight" data-wow-delay="0.2s">
                        <div class="bg-light rounded p-4 mb-1">
                            <h4 class="text-primary mb-4">For Complaint</h4>
                            <div class="row g-4">
                                <div class="col-md-6 col-lg-6">
                                    <div class="contact-add-item">
                                        <div class="contact-icon text-primary mb-4">
                                            <i class="fa fa-phone-alt fa-2x"></i>
                                        </div>
                                        <div>
                                            <h5>Toll Free Number</h5>
                                            <p class="mb-0"><strong>18005728545</strong></p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>                            
                    </div>
                    
                    <div class="col-xl-7 col-lg-7 col-md-12 wow fadeInLeft" data-wow-delay="0.2s">
                        <div class="bg-light p-4 rounded h-100 wow fadeInUp">
                            <h4 class="text-primary">Feedback And Complaint Form</h4>
                            <form>
                                <div class="row g-4">
                                    <div class="col-lg-12 col-xl-12">
                                        <div class="form-check">
                                            <input type="radio" class="form-check-input border-0" id="type" name="type" value="feedback" checked> Feedback
                                        </div>
                                        <div class="form-check">
                                            <input type="radio" class="form-check-input border-0" id="type" name="type" value="Complaint"> Complaint
                                        </div>
                                    </div>
                                    <div class="col-lg-12 col-xl-12">
                                        <div class="form-floating">
                                            <select class="form-select" id="ulb" name="ulb" required>
                                                <option value="">Select Urban Local Bodies</option>
                                                <option value="">Nagar Nigam Jaipur</option>
                                                <option value="">Nagar Nigam Udaipur</option>
                                            </select>
                                            <label for="ulb">Select ULB <span class="text-danger">*</span></label>
                                        </div>
                                    </div>
                                    <div class="col-lg-12 col-xl-6">
                                        <div class="form-floating">
                                            <input type="text" class="form-control border-0" id="name" placeholder="Enter Name" required>
                                            <label for="name">Name <span class="text-danger">*</span></label>
                                        </div>
                                    </div>
                                    <div class="col-lg-12 col-xl-6">
                                        <div class="form-floating">
                                            <input type="text" class="form-control border-0" id="mobile" placeholder="Mobile No." required>
                                            <label for="mobile">Mobile No. <span class="text-danger">*</span></label>
                                        </div>
                                    </div>
                                    <div class="col-lg-12 col-xl-6">
                                        <div class="form-floating">
                                            <input type="email" class="form-control border-0" id="email" placeholder="Email ID" required>
                                            <label for="email">Email ID <span class="text-danger">*</span></label>
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <div class="form-floating">
                                            <textarea class="form-control border-0" placeholder="Type Address here" id="address" style="height: 100px" required></textarea>
                                            <label for="address">Address <span class="text-danger">*</span></label>
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <div class="form-floating">
                                            <textarea class="form-control border-0" placeholder="Type here" id="msg" style="height: 130px" required></textarea>
                                            <label for="msg">Feedback / Complaint <span class="text-danger">*</span></label>
                                        </div>
                                    </div>
                                    <div class="col-lg-12 col-xl-12">
                                        <div class="form-floating">
                                            <input type="file" class="form-control border-0" id="file" placeholder="upload document">
                                            <label for="file">Upload Document</label>
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <button class="btn btn-primary py-2 me-2">Submit</button>
                                    </div>
                                </div>
                            </form>                           
                        </div>
                    </div>
                    
                </div>
            </div>
        </div>
    {% endblock %}
